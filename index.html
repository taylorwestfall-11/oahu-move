<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Oahu Move Plan</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Oahu Move">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4a2c82">

<style>
  :root {
    /* Palette derived from the Hawaiian Airlines mark: deep purple → magenta gradient, hibiscus red-orange accent. */
    --bg: #f5f4f8; --card: #ffffff; --text: #201a2e; --muted: #766f85;
    --line: #e6e1ee; --accent: #4a2c82; --accent2: #c6368b;
    --crit: #e8432b; --high: #e08a2b; --norm: #3b82c4; --low: #9aa5b1;
    --done-bg: #f0edf7; --chip: #f0ecf7;
    --shadow: 0 1px 3px rgba(40,20,60,.10), 0 1px 2px rgba(40,20,60,.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16121f; --card: #201a2c; --text: #ece8f4; --muted: #a79dbb;
      --line: #33293f; --accent: #a87dda; --accent2: #ec6bb5;
      --crit: #ff8266; --high: #f0a94e; --norm: #6aa9e0; --low: #6b7787;
      --done-bg: #221c30; --chip: #291f38;
      --shadow: 0 1px 3px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 15px; line-height: 1.4; padding-bottom: 90px;
  }
  header {
    position: sticky; top: 0; z-index: 20;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; padding: 12px 14px 10px; box-shadow: var(--shadow);
  }
  .h-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .h-title { font-size: 18px; font-weight: 700; letter-spacing: .2px; }
  .sync { font-size: 11px; opacity: .85; display: flex; align-items: center; gap: 5px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #bff5d0; }
  .dot.busy { background: #ffe08a; }
  .countdowns { display: flex; gap: 8px; margin-top: 8px; }
  .cd {
    flex: 1; background: rgba(255,255,255,.16); border-radius: 10px;
    padding: 6px 8px; text-align: center;
  }
  .cd b { display: block; font-size: 20px; line-height: 1.1; }
  .cd span { font-size: 10.5px; opacity: .9; text-transform: uppercase; letter-spacing: .3px; }
  .progress-wrap { margin-top: 9px; }
  .progress-bar { height: 7px; background: rgba(255,255,255,.25); border-radius: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: #bff5d0; width: 0%; transition: width .4s; }
  .progress-label { font-size: 11px; opacity: .95; margin-top: 3px; }

  .controls {
    position: sticky; top: 0; z-index: 10; background: var(--bg);
    padding: 10px 12px; display: flex; flex-direction: column; gap: 8px;
    border-bottom: 1px solid var(--line);
  }
  .seg { display: flex; background: var(--chip); border-radius: 10px; padding: 3px; }
  .seg button {
    flex: 1; border: 0; background: transparent; color: var(--muted);
    padding: 8px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .seg button.active { background: var(--card); color: var(--text); box-shadow: var(--shadow); }
  .seg-badge {
    display: inline-flex; align-items: center; justify-content: center; min-width: 16px; height: 16px;
    padding: 0 4px; margin-left: 4px; border-radius: 9px; background: var(--accent2); color: #fff;
    font-size: 10px; font-weight: 700; vertical-align: middle;
  }
  .paused-badge { font-size: 10px; margin-left: 3px; vertical-align: middle; opacity: .85; }
  .rentals-paused-banner {
    display: flex; align-items: center; gap: 8px; background: var(--chip); color: var(--muted);
    font-size: 12px; padding: 9px 11px; border-radius: 10px; margin: 0 2px 10px;
  }
  .rentals-paused-banner b { color: var(--text); }
  .rental-sort-row { display: flex; gap: 6px; margin: 0 2px 9px; }
  .rental-sort-row button {
    border: 0; background: var(--chip); color: var(--muted); padding: 6px 12px;
    border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .rental-sort-row button.active { background: var(--accent); color: #fff; }
  .filter-controls { display: none; flex-direction: column; gap: 8px; } /* default view is Calendar */
  .filters { display: flex; gap: 6px; }
  .filters select, .search {
    flex: 1; min-width: 0; padding: 7px 8px; border: 1px solid var(--line);
    border-radius: 8px; background: var(--card); color: var(--text); font-size: 13px;
  }
  .toggle-done { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }

  main { padding: 8px 12px; }

  .card {
    background: var(--card); border-radius: 12px; padding: 11px 12px; margin-bottom: 9px;
    box-shadow: var(--shadow); border-left: 4px solid var(--norm); position: relative;
  }
  .card.crit { border-left-color: var(--crit); }
  .card.high { border-left-color: var(--high); }
  .card.low  { border-left-color: var(--low); }
  .card.done { background: var(--done-bg); opacity: .72; }
  .card.done .task-text { text-decoration: line-through; color: var(--muted); }
  .row1 { display: flex; align-items: flex-start; gap: 10px; }
  .cbox {
    appearance: none; -webkit-appearance: none; flex: none;
    width: 24px; height: 24px; border: 2px solid var(--muted); border-radius: 7px;
    cursor: pointer; position: relative; margin-top: 1px; background: var(--card);
  }
  .cbox:checked { background: var(--accent); border-color: var(--accent); }
  .cbox:checked::after {
    content: "✓"; color: #fff; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-53%); font-size: 15px; font-weight: 700;
  }
  .task-text { font-size: 14.5px; font-weight: 500; flex: 1; }
  .star { color: var(--high); }
  .meta { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 0 34px; align-items: center; }
  .chip {
    font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--chip);
    color: var(--muted); white-space: nowrap;
  }
  .chip.cat { font-weight: 600; }
  .chip.due { background: transparent; border: 1px solid var(--line); }
  .chip.due.overdue { color: var(--crit); border-color: var(--crit); }
  .owner-sel, .status-sel {
    font-size: 11.5px; padding: 3px 6px; border-radius: 20px; border: 1px solid var(--line);
    background: var(--chip); color: var(--text); font-weight: 600;
  }
  .notes { margin: 7px 0 0 34px; font-size: 12.5px; color: var(--muted); }
  .actions { margin: 8px 0 0 34px; display: flex; gap: 14px; }
  .actions button { border: 0; background: none; color: var(--muted); font-size: 12.5px; cursor: pointer; padding: 0; }
  .actions button.del { color: var(--crit); }

  /* ---- List view: compact rows + left week-strip nav ---- */
  .list-layout { display: flex; gap: 10px; align-items: flex-start; }
  .week-strip {
    flex: none; width: 68px; max-height: 70vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
    display: flex; flex-direction: column; gap: 7px; padding: 2px 2px 4px;
    scrollbar-width: none; -ms-overflow-style: none; /* hide scrollbar: Firefox / old Edge */
  }
  .week-strip::-webkit-scrollbar { display: none; } /* hide scrollbar: Chrome/Safari/Edge */
  .week-strip-item {
    flex: none; display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--card); border-radius: 12px; padding: 9px 2px 10px; box-shadow: var(--shadow);
    cursor: pointer; border: 2px solid transparent;
  }
  .wsi-month { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .3px; }
  .wsi-day { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .week-strip-item.is-today-week { border-color: var(--accent2); }
  .week-strip-item.active { background: var(--accent); border-color: var(--accent); }
  .week-strip-item.active .wsi-month, .week-strip-item.active .wsi-day { color: #fff; }
  .week-strip-item.has-tasks .wsi-day::after {
    content: ''; display: block; width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent2); margin: 3px auto 0;
  }
  .week-strip-item.active.has-tasks .wsi-day::after { background: #fff; }

  .list-content { flex: 1; min-width: 0; }
  .list-week-title { display: flex; align-items: baseline; gap: 7px; font-size: 13px; font-weight: 700; color: var(--muted); margin: 2px 2px 10px; }
  .list-week-title .lw-now { color: var(--accent); text-transform: uppercase; font-size: 10.5px; font-weight: 700; letter-spacing: .3px; }

  .lrow {
    display: flex; align-items: center; gap: 9px; background: var(--card); border-radius: 10px;
    padding: 9px 10px; margin-bottom: 6px; box-shadow: var(--shadow); border-left: 4px solid var(--norm);
    cursor: pointer;
  }
  .lrow.crit { border-left-color: var(--crit); }
  .lrow.high { border-left-color: var(--high); }
  .lrow.low  { border-left-color: var(--low); }
  .lrow.done { background: var(--done-bg); opacity: .68; }
  .lrow.done .lrow-text { text-decoration: line-through; color: var(--muted); }
  .lrow-cb { margin-top: 0; }
  .lrow-text { flex: 1; min-width: 0; font-size: 13.5px; font-weight: 500; line-height: 1.35; }
  .lrow-star { color: var(--high); }
  .lrow-due { flex: none; font-size: 10.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
  .lrow-due.overdue { color: var(--crit); }
  .btn.danger { background: transparent; color: var(--crit); flex: none; padding: 13px 18px; }
  .hidden { display: none !important; }

  .fab {
    position: fixed; right: 18px; bottom: 22px; width: 58px; height: 58px; border-radius: 50%;
    background: var(--accent); color: #fff; border: 0; font-size: 30px; box-shadow: 0 4px 14px rgba(74,44,130,.5);
    cursor: pointer; z-index: 30; line-height: 1;
  }
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; }

  .modal-bg {
    position: fixed; inset: 0; background: rgba(10,20,30,.55); z-index: 40;
    display: none; align-items: flex-end; justify-content: center;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--card); width: 100%; max-width: 520px; border-radius: 18px 18px 0 0;
    padding: 18px 16px 22px; max-height: 92vh; overflow-y: auto;
  }
  .modal h3 { margin: 0 0 14px; font-size: 17px; }
  .modal label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
  .modal input, .modal select, .modal textarea {
    width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 9px;
    background: var(--bg); color: var(--text); font-size: 15px; font-family: inherit;
  }
  .modal textarea { min-height: 60px; resize: vertical; }
  .modal .two { display: flex; gap: 10px; }
  .modal .two > div { flex: 1; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn {
    flex: 1; padding: 13px; border: 0; border-radius: 11px; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.ghost { background: var(--chip); color: var(--text); }
  .toast {
    position: fixed; bottom: 92px; left: 50%; transform: translateX(-50%);
    background: #1a2330; color: #fff; padding: 9px 16px; border-radius: 20px;
    font-size: 13px; z-index: 50; opacity: 0; transition: opacity .25s; pointer-events: none;
  }
  .toast.show { opacity: .95; }

  /* ---- Calendar view ---- */
  .cal-nav { display: flex; align-items: center; gap: 10px; margin: 4px 2px 10px; }
  .cal-nav-center { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .cal-nav button { flex: none; width: 42px; height: 42px; border: 0; border-radius: 11px; background: var(--chip); color: var(--text); font-size: 22px; cursor: pointer; }
  .cal-title { flex: 1; text-align: center; font-weight: 700; font-size: 16px; }
  .cal-subnav { display: flex; align-items: center; gap: 10px; margin: 0 2px 14px; }
  .cal-subnav-center { display: flex; justify-content: center; flex: 1; min-width: 0; }
  .cal-subnav-spacer { flex: none; width: 58px; }
  .cal-today-btn { flex: none; font-size: 12px !important; width: 58px !important; padding: 0; height: 34px !important; }
  .seg.subseg { padding: 3px; background: var(--chip); border-radius: 11px; }
  .seg.subseg button { padding: 8px 18px; font-size: 14px; }
  .seg.subseg button.active { background: var(--card); box-shadow: var(--shadow); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; grid-auto-rows: minmax(84px, auto); }
  .cal-dow { margin-bottom: 4px; grid-auto-rows: auto; }
  .dow { text-align: center; font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; }
  .cal-cell { background: var(--card); border-radius: 9px; padding: 3px 3px 4px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 3px; overflow: hidden; min-height: 84px; }
  .cal-cell.empty-cell { background: transparent; box-shadow: none; }
  .cal-cell.today { outline: 2px solid var(--accent); }
  .cal-cell.drag-over { outline: 2px dashed var(--accent); background: var(--done-bg); }
  .cal-daynum { font-size: 11px; color: var(--muted); font-weight: 700; line-height: 1; padding: 1px 2px; }
  .cal-cell.today .cal-daynum { color: var(--accent); }
  .cal-chips { display: flex; flex-direction: column; gap: 3px; }
  .cal-chip {
    font-size: 11.5px; line-height: 1.3; padding: 3px 5px; border-radius: 5px;
    background: var(--chip); color: var(--text); white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; border-left: 3px solid var(--norm); touch-action: none; cursor: grab; user-select: none;
  }
  .cal-chip.crit { border-left-color: var(--crit); }
  .cal-chip.high { border-left-color: var(--high); }
  .cal-chip.low  { border-left-color: var(--low); }
  .cal-chip.chip-done { opacity: .5; text-decoration: line-through; }
  .cal-chip-drag { position: fixed; z-index: 100; transform: translate(-50%, -120%); pointer-events: none; box-shadow: 0 6px 16px rgba(0,0,0,.4); max-width: 150px; opacity: .96; }

  /* ---- Zoomed-in week view (Calendar tab, Week toggle): vertical day rows, full width ---- */
  .cal-week-list { display: flex; flex-direction: column; gap: 7px; }
  .cal-week-list .cal-cell {
    flex-direction: row; align-items: center; min-height: 0; padding: 9px 11px; gap: 11px;
  }
  .cal-week-list .cal-daynum {
    flex: none; width: 40px; padding: 0; display: flex; flex-direction: column; align-items: center; gap: 1px;
  }
  .wk-dow { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; color: var(--muted); }
  .wk-num { font-size: 19px; font-weight: 700; line-height: 1.1; color: var(--text); }
  .cal-cell.today .wk-dow, .cal-cell.today .wk-num { color: var(--accent); }
  .cal-week-list .cal-chips { flex: 1; min-width: 0; gap: 6px; }
  .cal-week-list .cal-chip {
    font-size: 13px; line-height: 1.35; padding: 6px 9px;
    white-space: normal; overflow: visible; text-overflow: clip;
  }
  .cal-chips-empty { font-size: 12px; color: var(--muted); font-style: italic; }
  .cal-tray { margin-top: 14px; background: var(--card); border-radius: 12px; padding: 10px 10px 8px; box-shadow: var(--shadow); }
  .tray-label { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .3px; margin-bottom: 7px; }
  .tray-chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 3px; }
  .tray-chips .cal-chip { flex: none; max-width: 170px; font-size: 11px; padding: 5px 8px; }
  .cal-hint { text-align: center; font-size: 11px; color: var(--muted); margin: 12px 4px 0; }

  .week-focus { margin-top: 18px; }
  .wf-header-row {
    display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 6px 10px;
    margin: 0 2px 9px; padding-bottom: 6px; border-bottom: 2px solid var(--accent);
  }
  .wf-header { display: flex; align-items: baseline; gap: 6px; font-size: 14.5px; font-weight: 700; color: var(--accent); }
  .wf-header small { color: var(--muted); font-weight: 600; font-size: 11.5px; }
  .wf-toggle { display: flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 600; color: var(--muted); white-space: nowrap; }
  .wf-empty { text-align: center; color: var(--muted); padding: 18px; font-size: 13px; background: var(--card); border-radius: 12px; box-shadow: var(--shadow); }

  .cal-title .lw-now { color: var(--accent); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .3px; margin-left: 4px; }
  .list-section-label {
    font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase;
    letter-spacing: .3px; margin: 18px 2px 8px;
  }

  /* ---- Rentals view: row layout (thumb | info | actions), whole card links out to Zillow ---- */
  .rental-card {
    display: flex; align-items: stretch; gap: 10px; background: var(--card); border-radius: 12px;
    padding: 8px; margin-bottom: 9px; box-shadow: var(--shadow);
  }
  .rental-link-wrap {
    flex: 1; min-width: 0; display: flex; gap: 10px; text-decoration: none; color: inherit;
    cursor: pointer;
  }
  .rental-thumb-wrap {
    position: relative; flex: none; width: 90px; height: 90px; border-radius: 10px;
    overflow: hidden; background: var(--chip);
  }
  .rental-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
  .rental-thumb-fallback {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    font-size: 30px; color: var(--muted); background: var(--chip);
  }
  .rental-badge {
    position: absolute; top: 3px; left: 3px; background: var(--accent2); color: #fff;
    font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 8px; letter-spacing: .2px;
  }
  .rental-badge-both {
    position: absolute; bottom: 3px; left: 3px; right: 3px; background: rgba(74,44,130,.88); color: #fff;
    font-size: 8.5px; font-weight: 700; padding: 2px 4px; border-radius: 6px; letter-spacing: .2px;
    text-align: center;
  }
  .rental-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 2px; }
  .rental-price-row { display: flex; align-items: baseline; gap: 6px; }
  .rental-price { font-size: 17px; font-weight: 800; color: var(--accent); }
  .rental-pets-inline { display: flex; gap: 2px; font-size: 13px; }
  .rental-address { font-size: 12.5px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rental-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
  .chip-sm {
    font-size: 10.5px; padding: 2px 7px; border-radius: 20px; background: var(--chip);
    color: var(--muted); white-space: nowrap;
  }
  .chip-sm.perk { background: var(--done-bg); color: var(--accent); font-weight: 600; }
  .rental-notes { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .rental-actions { flex: none; width: 84px; display: flex; flex-direction: column; gap: 5px; justify-content: center; }
  .rental-actions button {
    width: 100%; border: 0; border-radius: 9px; padding: 8px 4px; font-size: 11.5px; font-weight: 700;
    cursor: pointer; background: var(--chip); color: var(--text);
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .rental-actions button.active-viewed { background: var(--norm); color: #fff; }
  .rental-actions button.active-save { background: var(--accent); color: #fff; }
  .rental-actions button.active-decline { background: var(--crit); color: #fff; }
</style>
</head>
<body>

<header>
  <div class="h-top">
    <div class="h-title">🌺 Oahu Move</div>
    <div class="sync"><span class="dot" id="dot"></span><span id="syncTxt">synced</span></div>
  </div>
  <div class="countdowns">
    <div class="cd"><b id="cdList">–</b><span>days to list house</span></div>
    <div class="cd"><b id="cdMove">–</b><span>days to Hawaii</span></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    <div class="progress-label" id="progLabel">Loading…</div>
  </div>
</header>

<div class="controls">
  <div class="seg">
    <button id="segCal" class="active" onclick="setView('cal')">🗓 Calendar</button>
    <button id="segList" onclick="setView('list')">☑︎ List</button>
    <button id="segRentals" onclick="setView('rentals')">🏠 Rentals<span class="paused-badge" title="Auto-import paused">⏸️</span><span class="seg-badge" id="rentalsNewBadge" style="display:none"></span></button>
  </div>
  <div class="filter-controls" id="filterControls">
    <div class="filters">
      <select id="fCat" onchange="render()"><option value="">All categories</option></select>
      <input class="search" id="search" placeholder="Search tasks…" oninput="render()">
    </div>
    <label class="toggle-done"><input type="checkbox" id="showDone" onchange="render()"> Show completed</label>
  </div>
</div>

<main id="main"><div class="empty">Loading your move plan…</div></main>

<button class="fab" onclick="fabClick()">+</button>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">Add task</h3>
    <input type="hidden" id="mId">
    <label>Task</label>
    <textarea id="mTask" placeholder="What needs to happen?"></textarea>
    <div class="two">
      <div><label>Category</label><select id="mCat"></select></div>
      <div><label>Owner</label><select id="mOwner"></select></div>
    </div>
    <div class="two">
      <div><label>Due date</label><input type="date" id="mDue"></div>
      <div><label>Priority</label><select id="mPriority"></select></div>
    </div>
    <div class="two">
      <div><label>Status</label><select id="mStatus"></select></div>
      <div><label>Milestone</label><select id="mMilestone"><option value="">No</option><option value="yes">Yes ★</option></select></div>
    </div>
    <label>Notes</label>
    <textarea id="mNotes" placeholder="Links, phone numbers, details…"></textarea>
    <div class="modal-actions">
      <button class="btn danger hidden" id="mDelete" onclick="deleteFromModal()">🗑 Delete</button>
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn primary" id="mSave" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="rentalModalBg">
  <div class="modal">
    <h3 id="rentalModalTitle">Add listing</h3>
    <input type="hidden" id="rId">
    <label>Address / Title</label>
    <input type="text" id="rAddress" placeholder="123 Aloha St, Kailua">
    <label>Listing URL</label>
    <input type="text" id="rUrl" placeholder="https://…">
    <label>Photo URL</label>
    <input type="text" id="rPhotoUrl" placeholder="https://… (paste image address)">
    <div class="two">
      <div><label>Price / mo</label><input type="number" id="rPrice" placeholder="3500"></div>
      <div><label>Sq Ft</label><input type="number" id="rSqft" placeholder="1100"></div>
    </div>
    <div class="two">
      <div><label>Beds</label><input type="number" id="rBeds" placeholder="3"></div>
      <div><label>Baths</label><input type="number" id="rBaths" placeholder="2"></div>
    </div>
    <label>Notes</label>
    <textarea id="rNotes" placeholder="Anything worth remembering…"></textarea>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeRentalModal()">Cancel</button>
      <button class="btn primary" id="rSave" onclick="saveRentalModal()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
